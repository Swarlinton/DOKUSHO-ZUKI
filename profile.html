<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile - DOKUSHO-ZUKI</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #2b2b3d;
      --muted: #575771;
      --accent: #4a3f6e;
      --cream1: #dcd0ff;
      --cream2: #ccccff;
      --cream3: #cec8ef;
      --cream4: #e6e6fa;
      --shadow: 0 28px 70px rgba(98, 74, 190, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Inter", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      max-width: 1500px;
      margin: 0 auto;
      padding: 48px 40px 100px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 0;
    }

    .brand {
      display: inline-block;
      position: relative;
      font-size: 1.8rem;
      letter-spacing: 0.18em;
      font-weight: 700;
      color: #2b2b3d;
      background: #bea0ca;
      padding: 0.16em 0.28em;
      border-radius: 0em;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.45), 0 2px 0 rgba(0, 0, 0, 0.08);
      box-shadow: 0 10px 20px rgba(98, 74, 190, 0.1);
    }

    .brand::before {
      content: "";
      position: absolute;
      inset: 0;
      background: #bea0ca;
      border-radius: 0.1em;
      z-index: -1;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .nav a {
      padding: 6px 15px;
      border-radius: 999px;
      font-weight: 600;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .nav a:hover {
      transform: translateY(-1px);
      background: #d1bfd8
    }

    header .nav a.nav-signup {
      background: #bea0ca !important; 
      color: #2b2b3d !important;      
      padding: 6px 15px !important;   
      border-radius: 0px !important;  
      font-weight: 700 !important;
      display: inline-block !important;    
      letter-spacing: 0.1em;
      box-shadow: 0 10px 20px rgba(98, 74, 190, 0.1);
    }

    header .nav a.nav-signup:hover {
      filter: brightness(1.2);
      transform: translateY(-1px);
    }

    .profile-section {
      background: rgba(255, 255, 255, 0.76);
      border: 1px solid rgba(130, 102, 210, 0.12);
      border-radius: 30px;
      padding: 40px;
      box-shadow: 0 18px 40px rgba(134, 110, 212, 0.08);
      margin-top: 48px;
      text-align: center;
    }

    .profile-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: #bea0ca;
      margin: 0 auto 20px;
      position: relative;
    }

    .profile-avatar img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
    }

    .avatar-upload {
      position: absolute;
      bottom: 0;
      right: 0;
      background: #bea0ca;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .profile-avatar:hover .avatar-upload {
      opacity: 1;
    }

    .profile-section h2 {
      margin-top: 0;
    }

    .profile-details {
      text-align: left;
      max-width: 400px;
      margin: 0 auto;
    }

    .profile-details p {
      margin: 10px 0;
      color: var(--muted);
    }

    .profile-details input,
    .profile-details select {
      width: 100%;
      padding: 8px;
      border: 1px solid rgba(130, 102, 210, 0.2);
      border-radius: 5px;
      font-family: inherit;
      font-size: 1rem;
      margin-top: 5px;
    }

    .edit-mode .profile-details p {
      display: none;
    }

    .edit-mode .profile-details div {
      display: block;
    }

    .profile-details div {
      display: none;
      margin: 10px 0;
    }

    .profile-details div label {
      display: block;
      font-weight: bold;
      color: var(--text);
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 120px;
      padding: 10px 18px;
      border-radius: 999px;
      border: none;
      background: #bea0ca;
      color: var(--accent);
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 16px 28px rgba(130, 102, 210, 0.14);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      margin-top: 20px;
    }

    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 24px 40px rgba(130, 102, 210, 0.18);
    }

    .save-btn {
      background: #4CAF50;
      color: white;
    }

    .cancel-btn {
      background: #f44336;
      color: white;
    }

    @media (max-width: 900px) {
      .header {
        flex-direction: column;
        align-items: flex-start;
      }
    }

    .nav i {
      margin-right: 6px;
    }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <main class="page">
    <header class="header">
      <a href="index.html" class="brand">DOKUSHO-ZUKI</a>
      <nav class="nav">
        <a href="index.html"><i class="fas fa-home"></i> Home</a>
        <a href="manga-library.html"><i class="fas fa-book"></i> Manga Library</a>
        <a href="favorites.html"><i class="fas fa-heart"></i> Favorites</a>
        <a href="contact.html"><i class="fas fa-envelope"></i> Contact</a>
        <a href="aboutus.html"><i class="fas fa-circle-info"></i> About Us</a>
        <a href="profile.html"><i class="fas fa-user"></i> Profile</a>
        <a href="auth.html" class="nav-signup"><i class="fas fa-sign-in-alt"></i> Sign In / Register</a>
      </nav>
    </header>

    <section class="profile-section">
      <div class="profile-avatar">
        <img id="avatar-img" src="" alt="Avatar" style="display: none;">
        <label for="avatar-upload" class="avatar-upload">
          <i class="fas fa-camera"></i>
        </label>
        <input type="file" id="avatar-upload" accept="image/*" style="display: none;">
      </div>
      <h2 id="profile-name">User Name</h2>
      <div class="profile-details">
        <p><strong>Nickname:</strong> <span id="display-nickname">User Name</span></p>
        <div>
          <label for="edit-nickname">Nickname</label>
          <input type="text" id="edit-nickname" value="User Name">
        </div>
        <p><strong>Email:</strong> <span id="display-email">user@example.com</span></p>
        <p><strong>Activity Status:</strong> <span id="display-status">Active</span></p>
        <div>
          <label for="edit-status">Activity Status</label>
          <select id="edit-status">
            <option value="active">Active</option>
            <option value="inactive">Inactive</option>
          </select>
        </div>
        <p><strong>Joined:</strong> <span id="display-joined">January 2023</span></p>
        <p><strong>Books Read:</strong> <span id="display-books">42</span></p>
        <p><strong>Favorite Manga:</strong> <span id="display-favorites">Kamisama Kiss, Soul Eater</span></p>
        <div>
          <label for="edit-favorites">Favorite Manga (comma separated)</label>
          <input type="text" id="edit-favorites" value="Kamisama Kiss, Soul Eater">
        </div>
      </div>
      <button id="edit-btn" class="button">Edit Profile</button>
      <button id="save-btn" class="button save-btn" style="display: none;">Save</button>
      <button id="cancel-btn" class="button cancel-btn" style="display: none;">Cancel</button>
    </section>
  </main>
</body>
<script>
  // Check login
  const user = JSON.parse(localStorage.getItem('user'));
  if (!user || user.type !== 'user') {
    window.location.href = 'auth.html';
  }

  document.addEventListener('DOMContentLoaded', function() {
    const editBtn = document.getElementById('edit-btn');
    const saveBtn = document.getElementById('save-btn');
    const cancelBtn = document.getElementById('cancel-btn');
    const profileSection = document.querySelector('.profile-section');
    const avatarUpload = document.getElementById('avatar-upload');
    const avatarImg = document.getElementById('avatar-img');
    const profileName = document.getElementById('profile-name');
    const displayNickname = document.getElementById('display-nickname');
    const editNickname = document.getElementById('edit-nickname');
    const displayEmail = document.getElementById('display-email');
    const displayStatus = document.getElementById('display-status');
    const editStatus = document.getElementById('edit-status');
    const displayJoined = document.getElementById('display-joined');
    const displayBooks = document.getElementById('display-books');
    const displayFavorites = document.getElementById('display-favorites');
    const editFavorites = document.getElementById('edit-favorites');

    // Load from localStorage
    loadProfile();

    editBtn.addEventListener('click', function() {
      profileSection.classList.add('edit-mode');
      editBtn.style.display = 'none';
      saveBtn.style.display = 'inline-flex';
      cancelBtn.style.display = 'inline-flex';
      editNickname.value = displayNickname.textContent;
      editStatus.value = displayStatus.textContent.toLowerCase();
      editFavorites.value = displayFavorites.textContent;
    });

    saveBtn.addEventListener('click', function() {
      displayNickname.textContent = editNickname.value;
      profileName.textContent = editNickname.value;
      displayStatus.textContent = editStatus.value.charAt(0).toUpperCase() + editStatus.value.slice(1);
      displayFavorites.textContent = editFavorites.value;
      profileSection.classList.remove('edit-mode');
      editBtn.style.display = 'inline-flex';
      saveBtn.style.display = 'none';
      cancelBtn.style.display = 'none';
      saveProfile();
    });

    cancelBtn.addEventListener('click', function() {
      profileSection.classList.remove('edit-mode');
      editBtn.style.display = 'inline-flex';
      saveBtn.style.display = 'none';
      cancelBtn.style.display = 'none';
    });

    avatarUpload.addEventListener('change', function(event) {
      const file = event.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          avatarImg.src = e.target.result;
          avatarImg.style.display = 'block';
          saveProfile();
        };
        reader.readAsDataURL(file);
      }
    });

    function saveProfile() {
      const profile = {
        avatar: avatarImg.src,
        nickname: displayNickname.textContent,
        email: displayEmail.textContent,
        status: displayStatus.textContent,
        joined: displayJoined.textContent,
        books: displayBooks.textContent,
        favorites: displayFavorites.textContent
      };
      localStorage.setItem('userProfile', JSON.stringify(profile));
    }

    function loadProfile() {
      const profile = JSON.parse(localStorage.getItem('userProfile'));
      if (profile) {
        if (profile.avatar) {
          avatarImg.src = profile.avatar;
          avatarImg.style.display = 'block';
        }
        displayNickname.textContent = profile.nickname;
        profileName.textContent = profile.nickname;
        displayEmail.textContent = profile.email;
        displayStatus.textContent = profile.status;
        displayJoined.textContent = profile.joined;
        displayBooks.textContent = profile.books;
        displayFavorites.textContent = profile.favorites;
      }
    }
  });
</script>
</html>
