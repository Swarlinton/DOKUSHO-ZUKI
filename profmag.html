<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile Management - DOKUSHO-ZUKI</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #2b2b3d;
      --muted: #575771;
      --accent: #4a3f6e;
      --cream1: #dcd0ff;
      --cream2: #ccccff;
      --cream3: #cec8ef;
      --cream4: #e6e6fa;
      --shadow: 0 28px 70px rgba(98, 74, 190, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Inter", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      max-width: 1500px;
      margin: 0 auto;
      padding: 48px 40px 100px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 0;
    }

    .brand {
      display: inline-block;
      position: relative;
      font-size: 1.8rem;
      letter-spacing: 0.18em;
      font-weight: 700;
      color: #2b2b3d;
      background: #bea0ca;
      padding: 0.16em 0.28em;
      border-radius: 0em;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.45), 0 2px 0 rgba(0, 0, 0, 0.08);
      box-shadow: 0 10px 20px rgba(98, 74, 190, 0.1);
    }

    .brand::before {
      content: "";
      position: absolute;
      inset: 0;
      background: #bea0ca;
      border-radius: 0.1em;
      z-index: -1;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .nav a {
      padding: 6px 15px;
      border-radius: 999px;
      font-weight: 600;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .nav a:hover {
      transform: translateY(-1px);
      background: #d1bfd8
    }

    header .nav a.nav-signup {
      background: #bea0ca !important; 
      color: #2b2b3d !important;      
      padding: 6px 15px !important;   
      border-radius: 0px !important;  
      font-weight: 700 !important;
      display: inline-block !important;    
      letter-spacing: 0.1em;
      box-shadow: 0 10px 20px rgba(98, 74, 190, 0.1);
    }

    header .nav a.nav-signup:hover {
      filter: brightness(1.2);
      transform: translateY(-1px);
    }

    .section {
      background: rgba(255, 255, 255, 0.76);
      border: 1px solid rgba(130, 102, 210, 0.12);
      border-radius: 30px;
      padding: 40px;
      box-shadow: 0 18px 40px rgba(134, 110, 212, 0.08);
      margin-top: 48px;
    }

    .section {
      background: rgba(255, 255, 255, 0.76);
      border: 1px solid rgba(130, 102, 210, 0.12);
      border-radius: 30px;
      padding: 40px;
      box-shadow: 0 18px 40px rgba(134, 110, 212, 0.08);
      margin-top: 48px;
    }

    .section h1, .section > p {
      text-align: center;
    }

    .section > p {
      margin-bottom: 40px;
      color: var(--muted);
    }

    .profile-card {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 30px;
      margin-top: 30px;
      align-items: start;
    }

    .profile-panel {
      background: white;
      border-radius: 30px;
      padding: 32px;
      box-shadow: 0 16px 32px rgba(98, 74, 190, 0.08);
      text-align: center;
    }

    .profile-panel h2 {
      margin: 20px 0 10px;
      font-size: 1.6rem;
      color: var(--accent);
    }

    .profile-panel p {
      margin: 8px 0;
      color: var(--muted);
    }

    .profile-avatar {
      position: relative;
      width: 140px;
      height: 140px;
      margin: 0 auto;
      border-radius: 50%;
      background: #dcd0ff;
      overflow: hidden;
    }

    .profile-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .change-picture-btn {
      margin-top: 22px;
      padding: 12px 24px;
      border-radius: 999px;
      background: #bea0ca;
      border: none;
      color: var(--accent);
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 16px 28px rgba(130, 102, 210, 0.14);
    }

    .profile-form {
      background: white;
      border-radius: 30px;
      padding: 32px;
      box-shadow: 0 16px 32px rgba(98, 74, 190, 0.08);
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
    }

    .form-group input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid rgba(130, 102, 210, 0.2);
      border-radius: 12px;
      font-family: inherit;
      font-size: 1rem;
    }

    .form-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 24px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 120px;
      padding: 10px 18px;
      border-radius: 999px;
      border: none;
      background: #bea0ca;
      color: var(--accent);
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 16px 28px rgba(130, 102, 210, 0.14);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 24px 40px rgba(130, 102, 210, 0.18);
    }

    .save-btn {
      background: #4CAF50;
      color: white;
    }

    .cancel-btn {
      background: #f44336;
      color: white;
    }

    .message {
      margin-top: 16px;
      padding: 14px 18px;
      border-radius: 16px;
      background: #eef5ff;
      color: #2d2a55;
      display: none;
    }

    @media (max-width: 900px) {
      .header {
        flex-direction: column;
        align-items: flex-start;
      }

      .profile-card {
        grid-template-columns: 1fr;
      }
    }

    .nav i {
      margin-right: 6px;
    }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <main class="page">
    <header class="header">
      <a href="index.html" class="brand">DOKUSHO-ZUKI</a>
      <nav class="nav">
        <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
        <a href="mangmanage.html"><i class="fas fa-book"></i> Manga Management</a>
        <a href="usermanage.html"><i class="fas fa-users"></i> User Management</a>
        <a href="contmod.html"><i class="fas fa-shield-alt"></i> Content Moderation</a>
        <a href="profmag.html"><i class="fas fa-user-cog"></i> Profile Management</a>
        <a href="logout.html" class="nav-signup"><i class="fas fa-sign-out-alt"></i> Log-Out</a>
      </nav>
    </header>

    <section class="section">
      <h1>Profile Management</h1>
      <p>Manage admin settings, profile information, and password updates securely.</p>

      <div class="profile-card">
        <div class="profile-panel">
          <div class="profile-avatar">
            <img id="adminAvatar" src="" alt=" ">
          </div>
          <h2>Admin User</h2>
          <p id="adminEmailDisplay">admin@example.com</p>
          <button type="button" id="changePictureBtn" class="change-picture-btn">Change Picture</button>
          <input type="file" id="avatarInput" accept="image/*" style="display:none;" />
        </div>

        <div class="profile-form">
          <div class="form-grid">
            <div class="form-group">
              <label for="firstName">First Name</label>
              <input id="firstName" type="text" required>
            </div>
            <div class="form-group">
              <label for="lastName">Last Name</label>
              <input id="lastName" type="text" required>
            </div>
            <div class="form-group" style="grid-column: span 2;">
              <label for="adminEmail">Admin Email</label>
              <input id="adminEmail" type="email" required>
            </div>
            <div class="form-group" style="grid-column: span 2;">
              <label for="joinedDate">Joined</label>
              <input id="joinedDate" type="text" disabled>
            </div>
          </div>

          <h2>Change Password</h2>
          <div class="form-grid">
            <div class="form-group">
              <label for="currentPassword">Current Password</label>
              <input id="currentPassword" type="password">
            </div>
            <div class="form-group">
              <label for="newPassword">New Password</label>
              <input id="newPassword" type="password">
            </div>
            <div class="form-group">
              <label for="confirmPassword">Confirm Password</label>
              <input id="confirmPassword" type="password">
            </div>
          </div>

          <div class="form-row">
            <button type="button" id="saveProfileBtn" class="button save-btn">Save Changes</button>
            <button type="button" id="cancelProfileBtn" class="button cancel-btn">Cancel</button>
          </div>
          <div id="messageBox" class="message"></div>
        </div>
      </div>
    </section>
  </main>

  <script>
    const user = JSON.parse(localStorage.getItem('user'));
    if (!user || user.type !== 'admin') {
      window.location.href = 'auth.html';
    }

    const defaultAdminProfile = {
      firstName: 'Admin',
      lastName: 'User',
      email: 'admin@example.com',
      avatar: '',
      role: 'Admin User',
      joined: new Date().toLocaleDateString(),
      password: 'admin123'
    };

    let adminProfile = JSON.parse(localStorage.getItem('adminProfile') || 'null') || defaultAdminProfile;

    const adminAvatar = document.getElementById('adminAvatar');
    const adminEmailDisplay = document.getElementById('adminEmailDisplay');
    const firstNameInput = document.getElementById('firstName');
    const lastNameInput = document.getElementById('lastName');
    const adminEmailInput = document.getElementById('adminEmail');
    const joinedDateInput = document.getElementById('joinedDate');
    const currentPasswordInput = document.getElementById('currentPassword');
    const newPasswordInput = document.getElementById('newPassword');
    const confirmPasswordInput = document.getElementById('confirmPassword');
    const saveProfileBtn = document.getElementById('saveProfileBtn');
    const cancelProfileBtn = document.getElementById('cancelProfileBtn');
    const messageBox = document.getElementById('messageBox');
    const changePictureBtn = document.getElementById('changePictureBtn');
    const avatarInput = document.getElementById('avatarInput');

    function loadAdminProfile() {
      adminAvatar.src = adminProfile.avatar || 'https://via.placeholder.com/140?text=Admin';
      adminEmailDisplay.textContent = adminProfile.email;
      firstNameInput.value = adminProfile.firstName;
      lastNameInput.value = adminProfile.lastName;
      adminEmailInput.value = adminProfile.email;
      joinedDateInput.value = adminProfile.joined;
    }

    changePictureBtn.addEventListener('click', () => avatarInput.click());

    avatarInput.addEventListener('change', event => {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        adminAvatar.src = e.target.result;
        adminProfile.avatar = e.target.result;
        localStorage.setItem('adminProfile', JSON.stringify(adminProfile));
      };
      reader.readAsDataURL(file);
    });

    saveProfileBtn.addEventListener('click', () => {
      messageBox.style.display = 'none';
      adminProfile.firstName = firstNameInput.value.trim() || adminProfile.firstName;
      adminProfile.lastName = lastNameInput.value.trim() || adminProfile.lastName;
      adminProfile.email = adminEmailInput.value.trim() || adminProfile.email;
      adminEmailDisplay.textContent = adminProfile.email;

      if (currentPasswordInput.value || newPasswordInput.value || confirmPasswordInput.value) {
        if (currentPasswordInput.value !== adminProfile.password) {
          showMessage('Current password is incorrect.', true);
          return;
        }
        if (!newPasswordInput.value || newPasswordInput.value !== confirmPasswordInput.value) {
          showMessage('New password and confirm password must match.', true);
          return;
        }
        adminProfile.password = newPasswordInput.value;
      }

      localStorage.setItem('adminProfile', JSON.stringify(adminProfile));
      currentPasswordInput.value = '';
      newPasswordInput.value = '';
      confirmPasswordInput.value = '';
      showMessage('Profile updated successfully.', false);
    });

    cancelProfileBtn.addEventListener('click', () => {
      loadAdminProfile();
      currentPasswordInput.value = '';
      newPasswordInput.value = '';
      confirmPasswordInput.value = '';
      messageBox.style.display = 'none';
    });

    function showMessage(message, isError) {
      messageBox.textContent = message;
      messageBox.style.display = 'block';
      messageBox.style.background = isError ? '#ffe1e1' : '#eef5ff';
      messageBox.style.color = isError ? '#7f1d1d' : '#2d2a55';
    }

    loadAdminProfile();
  </script>
  <script>
    // Hide Sign-In/Register button when logged in
    const navSignup = document.querySelector('.nav-signup');
    if (navSignup) navSignup.style.display = 'none';
  </script>
</body>
</html>
