  <style>
    :root {
      --bg: #ffffff;
      --text: #2b2b3d;
      --muted: #575771;
      --accent: #4a3f6e;
      --cream1: #dcd0ff;
      --cream2: #ccccff;
      --cream3: #cec8ef;
      --cream4: #e6e6fa;
      --shadow: 0 28px 70px rgba(98, 74, 190, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Inter", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      max-width: 1500px;
      margin: 0 auto;
      padding: 48px 40px 100px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 0;
    }

    .brand {
      display: inline-block;
      position: relative;
      font-size: 1.8rem;
      letter-spacing: 0.18em;
      font-weight: 700;
      color: #2b2b3d;
      background: #bea0ca;
      padding: 0.16em 0.28em;
      border-radius: 0em;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.45), 0 2px 0 rgba(0, 0, 0, 0.08);
      box-shadow: 0 10px 20px rgba(98, 74, 190, 0.1);
    }

    .brand::before {
      content: "";
      position: absolute;
      inset: 0;
      background: #bea0ca;
      border-radius: 0.1em;
      z-index: -1;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .nav a {
      padding: 6px 15px;
      border-radius: 999px;
      font-weight: 600;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .nav a:hover {
      transform: translateY(-1px);
      background: #d1bfd8
    }

    header .nav a.nav-signup {
      background: #bea0ca !important; 
      color: #2b2b3d !important;      
      padding: 6px 15px !important;   
      border-radius: 0px !important;  
      font-weight: 700 !important;
      display: inline-block !important;    
      letter-spacing: 0.1em;
      box-shadow: 0 10px 20px rgba(98, 74, 190, 0.1);
    }

    header .nav a.nav-signup:hover {
      filter: brightness(1.2);
      transform: translateY(-1px);
    }

    .reader {
      text-align: center;
    }

    .manga-page {
      max-width: 100%;
      height: auto;
      margin: 20px 0;
      box-shadow: var(--shadow);
      border-radius: 10px;
    }

    .navigation {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 120px;
      padding: 10px 18px;
      border-radius: 999px;
      border: none;
      background: #bea0ca;
      color: var(--accent);
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 16px 28px rgba(130, 102, 210, 0.14);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 24px 40px rgba(130, 102, 210, 0.18);
    }

    @media (max-width: 900px) {
      .header {
        flex-direction: column;
        align-items: flex-start;
      }
    }

    .nav i {
      margin-right: 6px;
    }
  </style>

  <script>
    // Reading history tracking
    const mangaTitle = 'Kamisama Kiss';
    const mangaId = '001';
    const mangaImages = document.querySelectorAll('.manga-page');
    let currentPageIndex = 0;
    
    // Auto-update reading history on page change
    function updateReadingHistory() {
      const currentPage = currentPageIndex + 1;
      const chapter = 1; // This would be dynamic based on current chapter
      
      if (window.addToReadingHistory) {
        window.addToReadingHistory(mangaTitle, mangaId, chapter, currentPage);
      }
    }
    
    // Update history every 5 seconds while reading
    setInterval(updateReadingHistory, 5000);
    
    // Update history when page is about to close
    window.addEventListener('beforeunload', updateReadingHistory);
    
    // Initialize with current page
    updateReadingHistory();
    
    // Auth logic: Show logout button when logged in
    function updateAuthNav() {
      const user = JSON.parse(localStorage.getItem('user'));
      const navSignup = document.querySelector('.nav-signup');
      
      if (user && user.email) {
        // User is logged in - replace sign in button with logout button
        if (navSignup) {
          navSignup.innerHTML = '<i class="fas fa-sign-out-alt"></i> Logout';
          navSignup.href = '#';
          navSignup.onclick = function(e) {
            e.preventDefault();
            localStorage.removeItem('user');
            localStorage.removeItem('userProfile');
            window.location.href = 'index.html';
          };
        }
      } else {
        // User is not logged in - show sign in button
        if (navSignup) {
          navSignup.style.display = 'inline-block';
        }
      }
    }
    
    document.addEventListener('DOMContentLoaded', updateAuthNav);
    updateAuthNav();
  </script>
</body>
</html>
