<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Dashboard - DOKUSHO-ZUKI</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #2b2b3d;
      --muted: #575771;
      --accent: #4a3f6e;
      --cream1: #dcd0ff;
      --cream2: #ccccff;
      --cream3: #cec8ef;
      --cream4: #e6e6fa;
      --shadow: 0 28px 70px rgba(98, 74, 190, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Inter", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      max-width: 1500px;
      margin: 0 auto;
      padding: 48px 40px 100px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 0;
    }

    .brand {
      display: inline-block;
      position: relative;
      font-size: 1.8rem;
      letter-spacing: 0.18em;
      font-weight: 700;
      color: #2b2b3d;
      background: #bea0ca;
      padding: 0.16em 0.28em;
      border-radius: 0em;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.45), 0 2px 0 rgba(0, 0, 0, 0.08);
      box-shadow: 0 10px 20px rgba(98, 74, 190, 0.1);
    }

    .brand::before {
      content: "";
      position: absolute;
      inset: 0;
      background: #bea0ca;
      border-radius: 0.1em;
      z-index: -1;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .nav a {
      padding: 6px 15px;
      border-radius: 999px;
      font-weight: 600;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .nav a:hover {
      transform: translateY(-1px);
      background: #d1bfd8
    }

    header .nav a.nav-signup {
      background: #bea0ca !important; 
      color: #2b2b3d !important;      
      padding: 6px 15px !important;   
      border-radius: 0px !important;  
      font-weight: 700 !important;
      display: inline-block !important;    
      letter-spacing: 0.1em;
      box-shadow: 0 10px 20px rgba(98, 74, 190, 0.1);
    }

    header .nav a.nav-signup:hover {
      filter: brightness(1.2);
      transform: translateY(-1px);
    }

    .dashboard-section {
      background: rgba(255, 255, 255, 0.76);
      border: 1px solid rgba(130, 102, 210, 0.12);
      border-radius: 30px;
      padding: 40px;
      box-shadow: 0 18px 40px rgba(134, 110, 212, 0.08);
      margin-top: 48px;
    }

    .dashboard-section h1 {
      text-align: center;
    }

    .overview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .stat-card {
      background: white;
      border-radius: 24px;
      padding: 30px;
      box-shadow: 0 16px 32px rgba(98, 74, 190, 0.08);
      min-height: 170px;
    }

    .stat-card h2 {
      margin: 0 0 10px;
      font-size: 1rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    .stat-card p {
      margin: 0;
      font-size: 2.3rem;
      font-weight: 700;
      color: var(--accent);
    }

    .stat-change {
      margin-top: 12px;
      color: #4f4d70;
      font-size: 0.95rem;
    }

    .details-grid {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 24px;
      margin-top: 36px;
    }

    .activity-card,
    .popular-card {
      background: white;
      border-radius: 30px;
      padding: 30px;
      box-shadow: 0 16px 32px rgba(98, 74, 190, 0.08);
    }

    .activity-card h2,
    .popular-card h2 {
      margin-top: 0;
      color: var(--accent);
    }

    .activity-list,
    .popular-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    .activity-list li,
    .popular-list li {
      display: flex;
      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid rgba(130, 102, 210, 0.12);
      color: var(--muted);
    }

    .activity-list li:last-child,
    .popular-list li:last-child {
      border-bottom: none;
    }

    .popular-list li span:first-child {
      font-weight: 700;
      color: var(--text);
    }

    .popular-value {
      color: var(--accent);
      font-weight: 700;
    }

    @media (max-width: 900px) {
      .header {
        flex-direction: column;
        align-items: flex-start;
      }

      .details-grid {
        grid-template-columns: 1fr;
      }
    }

    .nav i {
      margin-right: 6px;
    }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <main class="page">
    <header class="header">
      <a href="index.html" class="brand">DOKUSHO-ZUKI</a>
      <nav class="nav">
        <a href="dashboard.html"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
        <a href="mangmanage.html"><i class="fas fa-book"></i> Manga Management</a>
        <a href="usermanage.html"><i class="fas fa-users"></i> User Management</a>
        <a href="contmod.html"><i class="fas fa-shield-alt"></i> Content Moderation</a>
        <a href="profmag.html"><i class="fas fa-user-cog"></i> Profile Management</a>
        <a href="logout.html" class="nav-signup"><i class="fas fa-sign-out-alt"></i> Log-Out</a>
      </nav>
    </header>

    <section class="dashboard-section">
      <h1>Admin Dashboard</h1>
      <p>Welcome to the admin panel. Manage the platform here.</p>
      <div class="overview-grid">
        <div class="stat-card">
          <h2>Total Users</h2>
          <p id="totalUsers">0</p>
          <div class="stat-change" id="totalUsersChange"></div>
        </div>
        <div class="stat-card">
          <h2>Total Manga Available</h2>
          <p id="totalManga">0</p>
          <div class="stat-change" id="totalMangaChange"></div>
        </div>
        <div class="stat-card">
          <h2>Daily Reads</h2>
          <p id="dailyReads">0</p>
          <div class="stat-change" id="dailyReadsChange"></div>
        </div>
        <div class="stat-card">
          <h2>Engagement Rate</h2>
          <p id="engagementRate">0%</p>
          <div class="stat-change" id="engagementRateChange"></div>
        </div>
      </div>

      <div class="details-grid">
        <section class="activity-card">
          <h2>Recent Activity</h2>
          <ul id="activityList" class="activity-list"></ul>
        </section>
        <section class="popular-card">
          <h2>Popular Manga This Week</h2>
          <ul id="popularManga" class="popular-list"></ul>
        </section>
      </div>
    </section>
  </main>

  <script>
    const user = JSON.parse(localStorage.getItem('user'));
    if (!user || user.type !== 'admin') {
      window.location.href = 'auth.html';
    }

    const defaultUsers = [
      { id: 'u1', name: 'Alice Smith', email: 'alice@example.com', role: 'user', status: 'Active', joined: '2024-01-10' },
      { id: 'u2', name: 'Marcus Lee', email: 'marcus@example.com', role: 'user', status: 'Active', joined: '2024-02-22' },
      { id: 'u3', name: 'Julia Park', email: 'julia@example.com', role: 'user', status: 'Banned', joined: '2023-12-08' }
    ];

    const defaultManga = [
      { id: 'm1', title: 'Kamisama Kiss', author: 'Hajime Yamamoto', chapters: 23, status: 'Ongoing', genre: 'Romance' },
      { id: 'm2', title: 'Soul Eater', author: 'Atsushi Okubo', chapters: 18, status: 'Completed', genre: 'Action' },
      { id: 'm3', title: 'Manga Manor', author: 'N. Author', chapters: 12, status: 'Ongoing', genre: 'Fantasy' }
    ];

    const users = JSON.parse(localStorage.getItem('adminUsers') || 'null') || defaultUsers;
    const manga = JSON.parse(localStorage.getItem('adminManga') || 'null') || defaultManga;

    const stats = {
      totalUsers: users.length,
      totalUsersChange: 4.6,
      totalManga: manga.length,
      totalMangaChange: 1.8,
      dailyReads: 3120,
      dailyReadsChange: 8.3,
      engagementRate: 72,
      engagementRateChange: 3.4,
      recentActivities: [
        'New manga added: Manga Manor',
        'Alice Smith favorited Soul Eater',
        'Marcus Lee updated profile settings',
        'Julia Park was banned for policy violations'
      ],
      popularManga: [
        { title: 'Kamisama Kiss', count: 182 },
        { title: 'Soul Eater', count: 154 },
        { title: 'Manga Manor', count: 98 }
      ]
    };

    function renderDashboard() {
      document.getElementById('totalUsers').textContent = stats.totalUsers;
      document.getElementById('totalUsersChange').textContent = `${stats.totalUsersChange}% from last week`;
      document.getElementById('totalManga').textContent = stats.totalManga;
      document.getElementById('totalMangaChange').textContent = `${stats.totalMangaChange}% from last week`;
      document.getElementById('dailyReads').textContent = stats.dailyReads.toLocaleString();
      document.getElementById('dailyReadsChange').textContent = `${stats.dailyReadsChange}% from yesterday`;
      document.getElementById('engagementRate').textContent = `${stats.engagementRate}%`;
      document.getElementById('engagementRateChange').textContent = `${stats.engagementRateChange}% from last week`;

      const activityList = document.getElementById('activityList');
      activityList.innerHTML = '';
      stats.recentActivities.forEach(entry => {
        const li = document.createElement('li');
        li.textContent = entry;
        activityList.appendChild(li);
      });

      const popularList = document.getElementById('popularManga');
      popularList.innerHTML = '';
      stats.popularManga.forEach(item => {
        const li = document.createElement('li');
        li.innerHTML = `<span>${item.title}</span><span class="popular-value">${item.count} reads</span>`;
        popularList.appendChild(li);
      });
    }

    document.addEventListener('DOMContentLoaded', renderDashboard);
  </script>
  <script>
    // Hide Sign-In/Register button when logged in
    const navSignup = document.querySelector('.nav-signup');
    if (navSignup) navSignup.style.display = 'none';
  </script>
</body>
</html>
