<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Favorites - DOKUSHO-ZUKI</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #2b2b3d;
      --muted: #575771;
      --accent: #4a3f6e;
      --cream1: #dcd0ff;
      --cream2: #ccccff;
      --cream3: #cec8ef;
      --cream4: #e6e6fa;
      --shadow: 0 28px 70px rgba(98, 74, 190, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Inter", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      max-width: 1500px;
      margin: 0 auto;
      padding: 48px 40px 100px;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 0;
    }

    .brand {
      display: inline-block;
      position: relative;
      font-size: 1.8rem;
      letter-spacing: 0.18em;
      font-weight: 700;
      color: #2b2b3d;
      background: #bea0ca;
      padding: 0.16em 0.28em;
      border-radius: 0em;
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.45), 0 2px 0 rgba(0, 0, 0, 0.08);
      box-shadow: 0 10px 20px rgba(98, 74, 190, 0.1);
    }

    .brand::before {
      content: "";
      position: absolute;
      inset: 0;
      background: #bea0ca;
      border-radius: 0.1em;
      z-index: -1;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .nav a {
      padding: 6px 15px;
      border-radius: 999px;
      font-weight: 600;
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .nav a:hover {
      transform: translateY(-1px);
      background: #d1bfd8
    }

    header .nav a.nav-signup {
      background: #bea0ca !important; 
      color: #2b2b3d !important;      
      padding: 6px 15px !important;   
      border-radius: 0px !important;  
      font-weight: 700 !important;
      display: inline-block !important;    
      letter-spacing: 0.1em;
      box-shadow: 0 10px 20px rgba(98, 74, 190, 0.1);
    }

    header .nav a.nav-signup:hover {
      filter: brightness(1.2);
      transform: translateY(-1px);
    }

    .favorites-grid {
      display: grid;
      gap: 24px;
      margin-top: 48px;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    }

    .manga-card {
      background: rgba(255, 255, 255, 0.76);
      border: 1px solid rgba(130, 102, 210, 0.12);
      border-radius: 30px;
      padding: 26px;
      box-shadow: 0 18px 40px rgba(134, 110, 212, 0.08);
      transition: transform 0.2s ease;
      text-align: center;
    }

    .manga-card:hover {
      transform: translateY(-5px);
    }

    .manga-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 20px;
      margin-bottom: 16px;
    }

    .manga-card h3 {
      margin: 0 0 14px;
      font-size: 1.2rem;
    }

    .manga-card p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 120px;
      padding: 10px 18px;
      border-radius: 999px;
      border: none;
      background: #bea0ca;
      color: var(--accent);
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 16px 28px rgba(130, 102, 210, 0.14);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      margin-top: 16px;
    }

    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 24px 40px rgba(130, 102, 210, 0.18);
    }

    .favorites-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 24px;
      margin-top: 48px;
    }

    .favorite-card {
      background: rgba(255, 255, 255, 0.76);
      border: 1px solid rgba(130, 102, 210, 0.12);
      border-radius: 30px;
      overflow: hidden;
      box-shadow: 0 18px 40px rgba(134, 110, 212, 0.08);
      position: relative;
      text-align: left;
    }

    .favorite-card img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
    }

    .favorite-card-content {
      padding: 20px;
    }

    .favorite-card h3 {
      margin: 0 0 10px;
      font-size: 1.15rem;
    }

    .favorite-card p {
      margin: 0 0 8px;
      color: var(--muted);
      line-height: 1.6;
    }

    .favorite-remove {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: rgba(255, 255, 255, 0.95);
      color: #e63946;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 8px 16px rgba(98, 74, 190, 0.12);
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .favorite-remove:hover {
      transform: translateY(-2px);
      background: #fff;
    }

    .empty-state {
      margin-top: 48px;
      text-align: center;
      color: var(--muted);
    }

    @media (max-width: 900px) {
      .header {
        flex-direction: column;
        align-items: flex-start;
      }
    }

    .nav i {
      margin-right: 6px;
    }
  </style>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
  <main class="page">
    <header class="header">
      <a href="index.html" class="brand">DOKUSHO-ZUKI</a>
      <nav class="nav">
        <a href="index.html"><i class="fas fa-home"></i> Home</a>
        <a href="manga-library.html"><i class="fas fa-book"></i> Manga Library</a>
        <a href="favorites.html"><i class="fas fa-heart"></i> Favorites</a>
        <a href="contact.html"><i class="fas fa-envelope"></i> Contact</a>
        <a href="aboutus.html"><i class="fas fa-circle-info"></i> About Us</a>
        <a href="community.html"><i class="fas fa-comments"></i> Community</a>
        <a href="guideline.html"><i class="fas fa-book-open"></i> Guidelines</a>
        <a href="history.html"><i class="fas fa-history"></i> History</a>
        <a href="profile.html"><i class="fas fa-user"></i> Profile</a>
        <a href="auth.html" class="nav-signup"><i class="fas fa-sign-in-alt"></i> Sign In / Register</a>
      </nav>
    </header>

    <section>
      <h1>Your Favorite Manga</h1>
      <p>Your personal collection of favorite manga titles.</p>
      <div id="favoritesGrid" class="favorites-grid"></div>
      <div id="emptyState" class="empty-state" style="display: none;">
        <p>You haven't added any favorites yet.</p>
        <a href="manga-library.html" class="button">Browse Library</a>
      </div>
    </section>
  </main>
  <script>
    const availableManga = [
      {
        id: 'kamisama-kiss',
        title: 'Kamisama Kiss',
        author: 'Julietta Suzuki',
        chapter: 'Chapter 6',
        img: 'kamikiss1.jpg',
        link: 'read.html'
      },
      {
        id: 'soul-eater',
        title: 'Soul Eater',
        author: 'Atsushi Okubo',
        chapter: 'Chapter 4',
        img: 'soul.jpg',
        link: 'read2.html'
      }
    ];

    function loadFavorites() {
      return JSON.parse(localStorage.getItem('favoriteManga') || '[]');
    }

    function saveFavorites(favorites) {
      localStorage.setItem('favoriteManga', JSON.stringify(favorites));
    }

    function renderFavorites() {
      const favorites = loadFavorites();
      const grid = document.getElementById('favoritesGrid');
      const emptyState = document.getElementById('emptyState');
      grid.innerHTML = '';

      if (!favorites.length) {
        emptyState.style.display = 'block';
        return;
      }

      emptyState.style.display = 'none';

      favorites.forEach(id => {
        const item = availableManga.find(m => m.id === id);
        if (!item) return;

        const card = document.createElement('article');
        card.className = 'favorite-card';
        card.innerHTML = `
          <img src="${item.img}" alt="${item.title}" />
          <button class="favorite-remove" aria-label="Remove ${item.title} from favorites"><i class="fas fa-heart"></i></button>
          <div class="favorite-card-content">
            <h3>${item.title}</h3>
            <p><strong>Author:</strong> ${item.author}</p>
            <p><strong>${item.chapter}</strong></p>
            <a href="${item.link}" class="button">Read Now</a>
          </div>
        `;

        card.querySelector('.favorite-remove').addEventListener('click', () => {
          const updated = loadFavorites().filter(favId => favId !== item.id);
          saveFavorites(updated);
          renderFavorites();
        });

        grid.appendChild(card);
      });
    }

    document.addEventListener('DOMContentLoaded', function() {
      renderFavorites();
    });
  </script>
  <script>
    const user = JSON.parse(localStorage.getItem('user'));
    if (!user || user.type !== 'user') {
      window.location.href = 'auth.html';
    }
  </script>
  <script>
    // Hide Sign-In/Register button when logged in
    const navSignup = document.querySelector('.nav-signup');
    if (navSignup) navSignup.style.display = 'none';
  </script>
</body>
</html>
